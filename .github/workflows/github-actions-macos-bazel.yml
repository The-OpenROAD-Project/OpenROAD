name: Build on macOS
on:
  push:
    branches:
      - master # Updated to strictly track master
  pull_request:
  workflow_dispatch:

jobs:
  Mac-Build:
    if: github.repository_owner != 'The-OpenROAD-Project-private'
    runs-on: macos-latest
    steps:
      - name: Setup xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Install Bazelisk
        run: brew install bazelisk

      - name: Build OpenROAD
        env:
          BAZEL_CACHE_PASSWORD: ${{ secrets.BAZEL_CACHE_PASSWORD }}
        run: |
          # With a cache password: opt into --config=ci (gRPC + Remote
          # Asset API + uploads) and inject Basic auth via remote_header.
          # Without one (fork PR): rely on .bazelrc's anonymous HTTPS
          # read-only cache. Anonymous gRPC + asset API would 401 at
          # Caddy, so we explicitly do not opt into --config=ci.
          REMOTE_FLAGS=()
          if [ -n "${BAZEL_CACHE_PASSWORD}" ]; then
            TOKEN_B64=$(printf 'ci:%s' "${BAZEL_CACHE_PASSWORD}" | base64 | tr -d '\n')
            REMOTE_FLAGS=(
              --config=ci
              --remote_header="Authorization=Basic ${TOKEN_B64}"
            )
          else
            echo "BAZEL_CACHE_PASSWORD unset (fork PR?); anonymous HTTPS read-only cache."
          fi
          bazelisk build \
            "${REMOTE_FLAGS[@]}" \
            --//:platform=gui //:openroad

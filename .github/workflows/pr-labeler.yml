name: PR Size Labeler

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Label PR Size
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'Very Small'
          xs_max_size: '10'
          s_label: 'Small'
          s_max_size: '100'
          m_label: 'Medium'
          m_max_size: '500'
          l_label: 'Large'
          l_max_size: '1000'
          xl_label: 'Very Large'
          fail_if_xl: 'false'
          files_to_ignore: '*ok'
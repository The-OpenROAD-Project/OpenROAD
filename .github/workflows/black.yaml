name: Lint Python

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:
  Black:
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run black
        uses: psf/black@87928e6d6761a4a6d22250e1fee5601b3998086e  # 26.5.1
